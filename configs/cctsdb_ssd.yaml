dataset:
  name: CCTSDB
  data_root: /home/sutongtong/LanTu_team1/advYOLO+AdaAD+CCTSDB/CCTSDB2021
  train_split: train
  val_split: test
  test_split: test
  image_dirs:
    train: images/train
    val: images/test
    test: images/test
  label_dirs:
    train: labels/train
    val: labels/test
    test: labels/test
  class_names:
    - mandatory
    - prohibitory
    - warning
  skip_empty_train: true

model:
  name: ssd300_vgg16
  pretrained_coco: false
  pretrained_backbone: true

train:
  epochs: 80
  batch_size: 16
  num_workers: 4
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 30
  lr_gamma: 0.1
  eval_map_every: 10
  quick_eval_samples: 100
  score_threshold: 0.3
