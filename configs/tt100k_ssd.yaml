dataset:
  name: TT100K
  data_root: /home/sutongtong/LanTu_team1/TT100K-2016
  train_split: train
  val_split: test
  test_split: test
  train_list: train.txt
  val_list: test.txt
  test_list: test.txt
  image_dirs:
    train: train/images
    val: test/images
    test: test/images
  label_dirs:
    train: train/labels
    val: test/labels
    test: test/labels
  class_names:
    - i2
    - i4
    - i5
    - il100
    - il60
    - il80
    - io
    - ip
    - p10
    - p11
    - p12
    - p19
    - p23
    - p26
    - p27
    - p3
    - p5
    - p6
    - pg
    - ph4
    - ph4.5
    - ph5
    - pl100
    - pl120
    - pl20
    - pl30
    - pl40
    - pl5
    - pl50
    - pl60
    - pl70
    - pl80
    - pm20
    - pm30
    - pm55
    - pn
    - pne
    - po
    - pr40
    - w13
    - w32
    - w55
    - w57
    - w59
    - wo
  skip_empty_train: true

model:
  name: ssd300_vgg16
  pretrained_coco: false
  pretrained_backbone: true

train:
  epochs: 80
  batch_size: 16
  num_workers: 4
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  lr_step_size: 30
  lr_gamma: 0.1
  eval_map_every: 10
  quick_eval_samples: 100
  score_threshold: 0.3
